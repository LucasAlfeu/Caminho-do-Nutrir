<section class="painel">
    <p> Olá, {{nomeUsuario}}</p>

    <div class="painel__form">
    <div class="container--form">
        <h1 class="painel__title">Bancos de Leite Humano</h1>
        <div class="painel__form--container">
            <input type="text" name="" id="" class="input-form">
            <button class="btn__padrao btn__form">Buscar</button>
        </div>
    </div>
    
    <table class="tabela">
        <thead class="thead__tabela">
            <tr>
                <th scope="col" class="col1">Nome do Banco</th>
                <th scope="col" class="col2">Data da Última Atualização</th>
                <th scope="col" class="col3"></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="col1 row">Banco 01</td> 
                <td class="col2 row">dd/mm/aaaa</td>
                <td class="col3 row">
                    <button class="btn__editar btn_acao"></button>
                    <button class="btn__excluir btn_acao"></button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</section>
